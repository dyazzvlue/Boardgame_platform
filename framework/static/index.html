<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GamePlatform</title>
<style>
:root{
  --bg:#111827;
  --panel:#16213e;
  --panel-alt:#0f3460;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#f0c040;
  --danger:#e94560;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  background:radial-gradient(circle at top,#22345c 0%,#16213e 32%,#101827 100%);
  color:var(--text);
  font-family:'Segoe UI','Microsoft YaHei',sans-serif;
  min-height:100vh;
  padding:clamp(12px,2vw,24px);
}
h1{font-size:clamp(1.8rem,4vw,2.6rem);margin-bottom:1.5rem;color:var(--accent)}
#lobby,#room-waiting,#game-wrap{width:min(100%,1280px);margin:0 auto;padding:clamp(12px,2vw,24px)}
.panel{background:rgba(22,33,62,.92);border-radius:var(--radius);padding:clamp(14px,2.4vw,24px);margin-bottom:1rem;box-shadow:0 18px 40px rgba(0,0,0,.24)}
h2{color:var(--accent);margin-bottom:1rem;font-size:clamp(1.05rem,2vw,1.3rem)}
input,select,button,textarea{font:inherit}
input,select{
  background:var(--panel-alt);
  border:1px solid rgba(255,255,255,.16);
  color:var(--text);
  padding:.7rem .9rem;
  border-radius:10px;
  font-size:1rem;
  width:100%;
  min-height:44px;
}
button{
  background:var(--danger);
  color:#fff;
  border:none;
  padding:.72rem 1.2rem;
  border-radius:10px;
  cursor:pointer;
  font-size:1rem;
  min-height:44px;
}
button:hover{background:#c73652}
button:disabled{opacity:.55;cursor:not-allowed;filter:saturate(.7)}
button:disabled:hover{background:var(--danger)}
button.secondary{background:var(--panel-alt)}
button.secondary:hover{background:#163d6e}
.game-card{display:block;background:var(--panel-alt);border-radius:14px;padding:1rem;margin:.4rem 0;cursor:pointer;border:2px solid transparent;transition:.2s;width:100%}
.game-card:hover,.game-card.selected{border-color:var(--accent)}
.game-card h3{color:var(--accent);font-size:1rem}
.game-card small{color:#aaa}
.row{display:flex;gap:.8rem;align-items:center;margin-top:.8rem;flex-wrap:wrap}
.row label{flex:0 0 88px;color:var(--muted)}
.row > input,.row > select,.row > div{flex:1 1 240px}
#error-msg{color:var(--danger);margin-top:.5rem;min-height:1.2em}
#player-list{margin-top:.8rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.6rem}
.player-item{background:var(--panel-alt);border-radius:10px;padding:.65rem .85rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;min-width:0}
.player-item span:last-child{word-break:break-word}
.player-item .badge{font-size:.75rem;background:var(--danger);border-radius:999px;padding:.18rem .5rem;white-space:nowrap}
.player-item .badge.ai{background:#444}
.player-item .badge.spectator{background:#2a4080}
.hidden{display:none}
#game-wrap{display:none}
#game-top-bar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 14px;background:#0d2137;border-bottom:1px solid #1a3a5c;border-radius:14px 14px 0 0}
#turn-timer{font-size:.95em;font-weight:bold;flex:1 1 260px}
#game-container{background:rgba(10,16,30,.82);border-radius:0 0 14px 14px;min-height:min(62vh,760px);padding:clamp(8px,1.6vw,16px);overflow:auto}
canvas{display:block;border-radius:12px;background:#0a0a1e;max-width:100%;height:auto}
#log-panel{background:#111;border-radius:14px;padding:.75rem;height:clamp(150px,20vh,240px);overflow-y:auto;margin-top:.75rem;font-size:.82rem;line-height:1.5}
.log-normal{color:#ccc}.log-header{color:var(--accent);font-weight:bold}
.log-section{color:#8ecfff}.log-bid{color:#ffa500}.log-deploy{color:#55c8a8}
.log-dice{color:#cf9aee}.log-profit{color:#5ad68a}.log-warn{color:#ff6b6b}
.log-ai{color:#9090c0}.log-dim{color:#666}
@media (min-width: 900px){
  #lobby{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:20px;align-items:start}
  #lobby h1,#error-msg{grid-column:1 / -1}
}
@media (max-width: 720px){
  body{padding:10px}
  #lobby,#room-waiting,#game-wrap,#home,#rules{padding:10px}
  .panel{padding:14px}
  .row label{flex:1 1 100%;min-width:0}
  .row > input,.row > select,.row > div{flex:1 1 100%}
  #game-top-bar{padding:10px}
  #turn-timer{flex-basis:100%}
}

/* ── 首页 & 规则页 ────────────────────────────────────────────────────── */
#home,#rules{width:min(100%,960px);margin:0 auto;padding:clamp(12px,2vw,24px)}
#home{text-align:center}
#home .site-title{font-size:clamp(2.2rem,5vw,3.2rem);color:var(--accent);margin-bottom:.6rem}
#home .site-desc{color:var(--muted);font-size:1.05rem;margin-bottom:2rem;line-height:1.7}
#home .stat-bar{display:flex;justify-content:center;gap:2rem;margin-bottom:2rem;flex-wrap:wrap}
#home .stat-item{background:var(--panel);border-radius:var(--radius);padding:1rem 1.6rem;min-width:120px}
#home .stat-item .num{font-size:2rem;font-weight:bold;color:var(--accent)}
#home .stat-item .label{color:var(--muted);font-size:.85rem}
#home .entry-cards{display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap}
#home .entry-card{background:var(--panel);border-radius:var(--radius);padding:1.6rem 2rem;cursor:pointer;border:2px solid transparent;transition:.25s;min-width:220px;flex:0 1 300px}
#home .entry-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.3)}
#home .entry-card .icon{font-size:2.4rem;margin-bottom:.6rem}
#home .entry-card h3{color:var(--accent);margin-bottom:.4rem;font-size:1.15rem}
#home .entry-card p{color:var(--muted);font-size:.9rem}
#rules .rules-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
#rules .rules-header h1{color:var(--accent);font-size:clamp(1.6rem,3.5vw,2.2rem);margin:0}
#rules .rules-game-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
#rules .rule-card{background:var(--panel);border-radius:var(--radius);padding:1rem 1.2rem;cursor:pointer;border:2px solid transparent;transition:.2s;text-align:center}
#rules .rule-card:hover,#rules .rule-card.active{border-color:var(--accent)}
#rules .rule-card h3{color:var(--accent);font-size:1rem;margin-bottom:.3rem}
#rules .rule-card small{color:var(--muted)}
#rule-content{background:var(--panel);border-radius:var(--radius);padding:clamp(16px,3vw,32px);line-height:1.8;display:none}
#rule-content h1,#rule-content h2,#rule-content h3{color:var(--accent);margin:1.2em 0 .5em}
#rule-content h1{font-size:1.5rem}
#rule-content h2{font-size:1.25rem}
#rule-content h3{font-size:1.1rem}
#rule-content p{margin:.6em 0;color:var(--text)}
#rule-content ul,#rule-content ol{margin:.6em 0 .6em 1.5em;color:var(--text)}
#rule-content li{margin:.3em 0}
#rule-content code{background:var(--panel-alt);padding:.15em .4em;border-radius:4px;font-size:.9em}
#rule-content pre{background:var(--panel-alt);padding:1rem;border-radius:8px;overflow-x:auto}
#rule-content table{border-collapse:collapse;width:100%;margin:1em 0}
#rule-content th,#rule-content td{border:1px solid rgba(255,255,255,.15);padding:.5em .8em;text-align:left}
#rule-content th{background:var(--panel-alt);color:var(--accent)}
#rule-content blockquote{border-left:3px solid var(--accent);padding:.4em 1em;margin:.6em 0;color:var(--muted)}
#rule-content strong{color:var(--accent)}
#rule-loading{color:var(--muted);padding:2rem;text-align:center}
</style>
<script src="/static/marked.min.js"></script>
</head>
<body>
<!-- 首页 -->
<div id="home">
  <div class="site-title">🎲 Dy's Game Room</div>
  <p class="site-desc">一个和朋友一起在线玩桌游的地方。<br>支持多人实时对局，规则自动裁判，随时随地开一局。</p>
  <div class="stat-bar">
    <div class="stat-item"><div class="num" id="home-game-count">—</div><div class="label">支持的游戏</div></div>
    <div class="stat-item"><div class="num" id="home-room-count">—</div><div class="label">功能完善中</div></div>
  </div>
  <div class="entry-cards">
    <div class="entry-card" onclick="enterLobby()">
      <div class="icon">🎮</div>
      <h3>游戏大厅</h3>
      <p>创建房间或加入好友的游戏</p>
    </div>
    <div class="entry-card" onclick="showRules()">
      <div class="icon">📖</div>
      <h3>游戏规则</h3>
      <p>查看所有支持的游戏的规则说明</p>
    </div>
  </div>
</div>

<!-- 大厅 -->
<div id="lobby" class="hidden">
  <h1>🎲 GamePlatform</h1>
  <div class="panel">
    <h2>创建房间</h2>
    <div class="row"><label>你的名字</label><input id="create-name" value="玩家1"></div>
    <div class="row"><label>房间密码</label><input id="create-pwd" placeholder="留空=无密码" type="password"></div>
    <div class="row"><label>回合时限</label>
      <select id="create-timeout" style="background:#0f3460;color:#eee;border:1px solid #444;padding:.5rem;border-radius:6px">
        <option value="30" selected>30 秒</option>
        <option value="60">1 分钟</option>
        <option value="0">不限制</option>
      </select>
    </div>
    <div class="row"><button id="btn-create-room" onclick="createRoom()" disabled>创建房间</button></div>
    <div id="create-status" style="margin-top:.6rem;color:var(--muted);font-size:.92rem;">正在连接服务器…</div>
  </div>
  <div class="panel">
    <h2>加入 / 观战</h2>
    <div class="row"><label>你的名字</label><input id="join-name" value="玩家2"></div>
    <div class="row"><label>房间码</label><input id="join-code" placeholder="6位房间码" style="text-transform:uppercase"></div>
    <div class="row"><label>密码</label><input id="join-pwd" placeholder="无密码留空" type="password"></div>
    <div class="row">
      <button onclick="joinRoom(false)">加入游戏</button>
      <button class="secondary" onclick="joinRoom(true)">观战</button>
    </div>
  </div>
  <div id="error-msg"></div>
</div>

<!-- 规则页 -->
<div id="rules" class="hidden">
  <div class="rules-header">
    <button class="secondary" onclick="showHome()" style="padding:.5rem 1rem">← 返回首页</button>
    <h1>📖 游戏规则</h1>
  </div>
  <div class="rules-game-list" id="rules-game-list"></div>
  <div id="rule-loading" style="display:none">加载中…</div>
  <div id="rule-content"></div>
</div>

<!-- 等待开始 -->
<div id="room-waiting" class="hidden">
  <div class="panel">
    <h2>房间 <span id="room-code-display" style="color:#f0c040"></span>
      <span id="room-pwd-hint" style="color:#888;font-size:.85rem;margin-left:.5rem"></span>
    </h2>
    <p style="color:#aaa;margin-bottom:.5rem">等待其他玩家加入，房间满员后自动开始游戏。</p>
    <div id="player-list"></div>
  </div>
</div>

<!-- 游戏界面 -->
<div id="game-wrap">
  <div id="game-top-bar" style="display:flex;justify-content:space-between;align-items:center;padding:4px 10px;background:#0d2137;border-bottom:1px solid #1a3a5c;">
    <div id="turn-timer" style="font-size:.95em;font-weight:bold;"></div>
    <button id="btn-return-room" onclick="returnToRoom()" style="display:none;background:#27ae60;color:#fff;padding:.35rem .8rem;border-radius:6px;border:none;cursor:pointer;font-size:.9em;margin-right:6px;">🏠 返回房间</button>
    <button id="btn-leave-game" onclick="leaveGame()" style="background:#c0392b;color:#fff;padding:.35rem .8rem;border-radius:6px;border:none;cursor:pointer;font-size:.9em;">🚪 退出游戏</button>
  </div>
  <div id="game-container"></div>
  <div id="log-panel"></div>
</div>

<script src="/static/lobby.js?v=1777580001"></script>
</body>
</html>
