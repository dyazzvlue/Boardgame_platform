# games.conf — GamePlatform 支持的游戏列表
#
# 格式（每行一个游戏，空行和 # 开头的行忽略）：
#   <game_id>  <env_var>  <local_dir_name>  <git_url>
#
# 字段说明：
#   game_id       — 与 framework/games/__init__.py 中的键一致
#   env_var       — 启动服务器时设置的路径环境变量名
#   local_dir_name — 克隆到 gameplatform 平级目录下的目录名
#   git_url       — Git 仓库地址

manila  MANILA_PATH  Manila   https://github.com/dyazzvlue/Boardgame_manila.git
avalon  AVALON_PATH  Avalon   https://github.com/dyazzvlue/Boardgame_Avalon.git
incan_gold  INCANGOLD_PATH  IncanGold   https://github.com/dyazzvlue/Boardgame_IncanGold.git
